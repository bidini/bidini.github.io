<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What I'm Reading — Benjamin Idini</title>
<meta name="description" content="Relevance-ranked feed of recent papers in planetary science and astrophysical instrumentation.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Source+Sans+3:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e1017;
  --bg2: #141720;
  --surface: #1a1e2a;
  --surface2: #222738;
  --border: #2a2f42;
  --text: #d8d8e4;
  --text-dim: #8888a0;
  --text-bright: #eeeef4;
  --accent: #6c8cff;
  --accent-dim: #4a5f99;
  --heading: #f0f0f8;
  --score-high: #5cb85c;
  --score-mid: #c4a94c;
  --score-low: #888;
  --save-color: #e8a838;

  --font-display: 'Cormorant Garamond', Georgia, serif;
  --font-body: 'Source Sans 3', -apple-system, sans-serif;
}

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}

body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--text);
  line-height:1.7;
  font-size:16px;
  font-weight:300;
  -webkit-font-smoothing:antialiased;
}

a{color:var(--accent);text-decoration:none;transition:color .2s}
a:hover{color:#9db4ff}

/* ── NAV ──────────────────────────────── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(14,16,23,0.85);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
}
.nav-inner{
  max-width:1080px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;height:56px;
}
.nav-name{
  font-family:var(--font-display);
  font-size:18px;font-weight:600;
  color:var(--heading);letter-spacing:0.5px;
}
.nav-links{display:flex;gap:28px}
.nav-links a{
  font-size:13px;font-weight:400;letter-spacing:0.4px;
  text-transform:uppercase;color:var(--text-dim);
  transition:color .2s;
}
.nav-links a:hover{color:var(--text-bright)}
.nav-links a.active{color:var(--text-bright)}
.nav-toggle{display:none;background:none;border:none;color:var(--text-dim);font-size:22px;cursor:pointer}

@media(max-width:720px){
  .nav-links{
    display:none;flex-direction:column;
    position:absolute;top:56px;left:0;right:0;
    background:rgba(14,16,23,0.97);
    border-bottom:1px solid var(--border);
    padding:16px 28px;gap:16px;
  }
  .nav-links.open{display:flex}
  .nav-toggle{display:block}
}

/* ── PAGE HEADER ──────────────────────── */
.page-header{
  max-width:760px;margin:0 auto;
  padding:100px 28px 20px;
}

.section-label{
  font-size:11px;font-weight:600;letter-spacing:3px;
  text-transform:uppercase;color:var(--accent);
  margin-bottom:12px;
}

.page-header h1{
  font-family:var(--font-display);
  font-size:clamp(28px,4vw,38px);
  font-weight:400;
  color:var(--heading);
  margin-bottom:8px;
  line-height:1.3;
}

.page-header p{
  font-size:14px;
  color:var(--text-dim);
}

.generated-info{
  max-width:760px;margin:0 auto;
  font-size:12px;color:var(--text-dim);
  padding:4px 28px;
}

/* ── CONTROLS ─────────────────────────── */
.controls{
  max-width:760px;margin:0 auto;
  padding:16px 28px;
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
}

.spacer{flex:1}

.sort-select{
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text);
  padding:5px 10px;border-radius:6px;
  font-size:13px;font-family:inherit;
}

.paper-count{font-size:13px;color:var(--text-dim)}

/* ── PAPER LIST ───────────────────────── */
.paper-list{max-width:760px;margin:0 auto;padding:0 28px}

.paper-row{
  display:grid;
  grid-template-columns:22px 48px 1fr auto;
  align-items:start;
  gap:12px;
  padding:14px 0;
  border-bottom:1px solid var(--border);
  cursor:pointer;
  transition:background .1s;
}
.paper-row:first-child{border-top:1px solid var(--border)}
.paper-row:hover{background:var(--surface);margin:0 -12px;padding-left:12px;padding-right:12px;border-radius:4px}

.saved-star{font-size:15px;color:var(--save-color);padding-top:1px}

.score-badge{
  font-size:14px;font-weight:600;
  font-variant-numeric:tabular-nums;
  text-align:right;padding-top:1px;
}
.score-high{color:var(--score-high)}
.score-mid{color:var(--score-mid)}
.score-low{color:var(--score-low)}

.paper-content{min-width:0}

.paper-title{
  font-size:15px;font-weight:400;
  color:var(--text);line-height:1.45;
}

.paper-meta{
  font-size:12px;color:var(--text-dim);
  margin-top:3px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

.paper-abstract{
  display:none;font-size:14px;
  color:var(--text-dim);
  margin-top:12px;line-height:1.65;
}
.paper-row.expanded .paper-abstract{display:block}

.paper-links{display:none;margin-top:10px;gap:14px}
.paper-row.expanded .paper-links{display:flex}
.paper-links a{font-size:12px}

.paper-date{font-size:12px;color:var(--text-dim);white-space:nowrap;padding-top:3px}

/* ── LOAD MORE ────────────────────────── */
.load-more{text-align:center;padding:24px}
.load-more button{
  background:var(--surface2);
  border:1px solid var(--border);
  color:var(--text-dim);
  padding:8px 24px;border-radius:6px;
  cursor:pointer;font-size:13px;font-family:inherit;
  transition:all .2s;
}
.load-more button:hover{color:var(--text);border-color:var(--accent-dim)}

.empty{text-align:center;padding:60px 20px;color:var(--text-dim)}

/* ── FOOTER ───────────────────────────── */
footer{
  text-align:center;padding:48px 28px;
  font-size:12px;color:var(--text-dim);
}

@media(max-width:640px){
  .paper-row{grid-template-columns:18px 40px 1fr;padding:10px 0}
  .paper-date{display:none}
  .page-header{padding-top:80px}
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <a href="../" class="nav-name">B. Idini</a>
    <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="Menu">☰</button>
    <div class="nav-links">
      <a href="../#about">About</a>
      <a href="../#research">Research</a>
      <a href="../#publications">Publications</a>
      <a href="../#blog">Blog</a>
      <a href="public_inbox.html" class="active">Arxiv</a>
      <a href="../CV.pdf">CV</a>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="section-label">Arxiv Inbox</div>
  <h1>What I'm Reading</h1>
  <p>Papers in Earth &amp; Planetary Astrophysics and Instrumentation, ranked by relevance to my research.</p>
</div>

<div class="generated-info" id="generated-info"></div>

<div class="controls">
  <span class="paper-count" id="paper-count"></span>
  <span class="spacer"></span>
  <select class="sort-select" id="sort-select">
    <option value="relevance">Relevance ↓</option>
    <option value="date">Newest first</option>
  </select>
</div>

<div class="paper-list" id="paper-list">
  <div class="empty">Loading papers...</div>
</div>

<div class="load-more" id="load-more" style="display:none;">
  <button onclick="showMore()">Show more</button>
</div>

<footer></footer>

<script>
let allPapers = [];
let filtered = [];
let shown = 0;
const PAGE = 100;

async function init() {
  try {
    const res = await fetch('papers.json');
    const data = await res.json();
    allPapers = data.papers || [];
    const gen = new Date(data.generated);
    document.getElementById('generated-info').textContent =
      `Last updated: ${gen.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}`;
    applyFilters();
  } catch (e) {
    document.getElementById('paper-list').innerHTML =
      '<div class="empty">Could not load papers.json</div>';
  }
}

function applyFilters() {
  const sort = document.getElementById('sort-select').value;
  filtered = [...allPapers];
  if (sort === 'date') {
    filtered.sort((a, b) => (b.is_saved - a.is_saved) || b.published.localeCompare(a.published));
  } else {
    filtered.sort((a, b) => (b.is_saved - a.is_saved) || (b.relevance_score - a.relevance_score));
  }
  shown = 0;
  document.getElementById('paper-list').innerHTML = '';
  showMore();
  document.getElementById('paper-count').textContent = `${filtered.length} papers`;
}

function scoreClass(s) {
  if (s >= 50) return 'score-high';
  if (s >= 25) return 'score-mid';
  return 'score-low';
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function showMore() {
  const batch = filtered.slice(shown, shown + PAGE);
  if (batch.length === 0 && shown === 0) {
    document.getElementById('paper-list').innerHTML =
      '<div class="empty">No papers found for this period.</div>';
    document.getElementById('load-more').style.display = 'none';
    return;
  }

  const html = batch.map(p => `
    <div class="paper-row" onclick="this.classList.toggle('expanded')">
      <div class="saved-star">${p.is_saved ? '★' : ''}</div>
      <div class="score-badge ${scoreClass(p.relevance_score)}">${p.relevance_score.toFixed(1)}</div>
      <div class="paper-content">
        <div class="paper-title">${esc(p.title)}</div>
        <div class="paper-meta">${esc(p.authors)}</div>
        <div class="paper-abstract">${esc(p.abstract)}</div>
        <div class="paper-links">
          <a href="${p.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">arxiv</a>
          <a href="${p.pdf_url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">pdf</a>
        </div>
      </div>
      <div class="paper-date">${p.published}</div>
    </div>
  `).join('');

  document.getElementById('paper-list').insertAdjacentHTML('beforeend', html);
  shown += batch.length;
  document.getElementById('load-more').style.display =
    shown < filtered.length ? '' : 'none';
}

document.getElementById('sort-select').onchange = () => applyFilters();

document.querySelectorAll('.nav-links a').forEach(a => {
  a.addEventListener('click', () => {
    document.querySelector('.nav-links').classList.remove('open');
  });
});

init();
</script>
</body>
</html>
